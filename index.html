<!DOCTYPE html>
<html>
<head>
    <title>Snake Code Decoder</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: #eee; }
        #drop-zone { border: 3px dashed #666; padding: 50px; margin: 20px auto; width: 300px; cursor: pointer; }
        #drop-zone.hover { border-color: #0f0; background: #333; }
        #result { font-size: 1.5em; color: #0f0; margin-top: 20px; }
        canvas { display: none; } /* Hidden canvas for processing */
    </style>
</head>
<body>
    <h2>Snake Wrap Decoder</h2>
    <div id="drop-zone">Drag & Drop QR Screenshot Here</div>
    <div id="result">Waiting for image...</div>
    <canvas id="canvas"></canvas>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });

        // ROYGBIVMBlW Palette (RGB)
        const PALETTE = [
            [255, 0, 0], [255, 127, 0], [255, 255, 0], [0, 255, 0],
            [0, 0, 255], [75, 0, 130], [148, 0, 211], [255, 0, 255],
            [0, 0, 0], [255, 255, 255]
        ];

        // Drag & Drop events
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('hover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('hover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('hover');
            const file = e.dataTransfer.files[0];
            const reader = new FileReader();
            reader.onload = (event) => processImage(event.target.result);
            reader.readAsDataURL(file);
        };

        function processImage(src) {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                decode(15, 9); // Set your cols/rows here
            };
            img.src = src;
        }

        function decode(cols, rows) {
            const cellW = canvas.width / cols;
            const cellH = canvas.height / rows;
            let digits = "";

            for (let r = 0; r < rows; r++) {
                const isReverse = (r % 2 !== 0);
                for (let c = 0; c < cols; c++) {
                    const actualCol = isReverse ? (cols - 1) - c : c;
                    const x = (actualCol * cellW) + (cellW / 2);
                    const y = (r * cellH) + (cellH / 2);

                    const p = ctx.getImageData(x, y, 1, 1).data;
                    digits += getClosestDigit(p[0], p[1], p[2]);
                }
            }

            let text = "";
            for (let i = 0; i < digits.length - 2; i += 3) {
                text += String.fromCharCode(parseInt(digits.substr(i, 3)));
            }
            document.getElementById('result').innerText = "Decoded: " + text;
        }

        function getClosestDigit(r, g, b) {
            let min = Infinity, best = 0;
            PALETTE.forEach((color, i) => {
                const d = Math.sqrt((r-color[0])**2 + (g-color[1])**2 + (b-color[2])**2);
                if (d < min) { min = d; best = i; }
            });
            return best;
        }
    </script>
</body>
</html>
